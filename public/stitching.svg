<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="none" role="img" aria-label="Hand-stitched border">
  <title>Hand-stitched border</title>
  <!-- Transparent background: this SVG intentionally has no filled shapes. -->

  <!-- stitched border: two slightly offset dashed strokes to feel "hand done" -->
  <rect
    x="58" y="58" width="396" height="396" rx="22"
    fill="none"
    stroke="#2a2a2a"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="10 18 8 16 12 20 7 15"
    opacity="0.9"
  />
  <rect
    x="62" y="62" width="388" height="388" rx="20"
    fill="none"
    stroke="#2a2a2a"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="6 14 9 15 5 13 8 16"
    opacity="0.55"
  />
</svg>

